version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api   # created in Phase 8
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./models:/app/models
    depends_on:
      - mlflow
    # uncomment after Dockerfile.api exists:
    # command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.2
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri /mlflow/mlruns
      --default-artifact-root /mlflow/mlruns
