[tool.ruff]
line-length = 88
target-version = "py311"
select = ["E", "F", "W", "I", "UP"]
ignore = ["E501"]
exclude = ["notebooks/", "venv/", ".venv/"]

[tool.ruff.isort]
known-first-party = ["src"]

[tool.black]
line-length = 88
target-version = ["py311"]
exclude = '''
/(
    notebooks
  | venv
  | \.venv
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
